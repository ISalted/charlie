name: charlie-aqa

# Synthetic monitoring of a revenue-critical funnel: scheduled + on-demand.
# NOT per-PR — a completion run creates real stage entities (user + trial booking).
on:
  schedule:
    - cron: "0 */6 * * *" # every 6h — tune to balance coverage vs. real entities created
  workflow_dispatch:
    inputs:
      grep:
        description: 'Playwright --grep filter (a tag like @smoke, or QZ-001; empty = all)'
        required: false
        default: ""

concurrency:
  group: aqa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run tests
        # No continue-on-error: the job result IS the honest pass/fail.
        run: |
          if [ -n "${{ github.event.inputs.grep }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.grep }}"
          else
            npx playwright test
          fi
        env:
          CI: "true"
          BASE_URL: ${{ secrets.BASE_URL }}
          API_URL: ${{ secrets.API_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          QUIZ_EMAIL_DOMAIN: ${{ secrets.QUIZ_EMAIL_DOMAIN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
